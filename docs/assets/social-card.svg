<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#12121a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0066ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d4aa;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="200" fill="#0066ff" opacity="0.1"/>
  <circle cx="1100" cy="530" r="250" fill="#00d4aa" opacity="0.1"/>
  
  <!-- Mackerel school -->
  <text x="600" y="180" font-size="120" text-anchor="middle" fill="#ff6b35">🐟🐟🐟</text>
  <text x="600" y="300" font-size="100" text-anchor="middle" fill="#ff6b35">🐟🐟🐟🐟🐟</text>
  <text x="600" y="420" font-size="120" text-anchor="middle" fill="#ff6b35">🐟🐟🐟</text>
  
  <!-- Title -->
  <text x="600" y="520" font-family="system-ui, sans-serif" font-size="64" font-weight="700" text-anchor="middle" fill="white">markrel</text>
  
  <!-- Tagline -->
  <text x="600" y="580" font-family="system-ui, sans-serif" font-size="28" text-anchor="middle" fill="#888899">School your documents with Markov chains</text>
  
  <!-- Accent line -->
  <rect x="450" y="540" width="300" height="4" rx="2" fill="url(#accent)"/>
</svg>
